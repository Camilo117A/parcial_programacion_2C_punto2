<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkSmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>ParkSmart</h2>
<hr>

<button type="button" class="btn btn-primary" onclick="mostrarFormRegistro()">Registrar Vehiculo</button>

<hr>
<section id="seccionRegistro">
<div class="container mt-3">
    <h2>Formulario de Registro</h2>
    <form id="formVehiculo" action="javascript:crearVehiculo();">
        <div class="mb-3 mt-3">
            <label for="placaId">Placa:</label>
            <input type="text" class="form-control" id="placaId" placeholder="Digite la placa" name="placa">
        </div>
        <div class="mb-3 mt-3">
            <label for="propietarioId">Propietario:</label>
            <input type="text" class="form-control" id="propietarioId" placeholder="Digite el propietario" name="propietario">
        </div>
        <div class="mb-3 mt-3">
            <label for="horasId">Horas Estacionado:</label>
            <input type="number" class="form-control" id="horasId" placeholder="Digite las horas" name="horas">
        </div>
        <div class="mb-3 mt-3">
            <label for="tarifaBaseId">Tarifa Base:</label>
            <input type="number" class="form-control" id="tarifaBaseId" placeholder="Digite la tarifa base" name="tarifaBase">
        </div>
        <div class="mb-3 mt-3">
            <label for="tipoVehiculoId">Tipo de Vehiculo:</label>
            <select class="form-select" id="tipoVehiculoId" onchange="mostrarCamposExtra()">
                <option value="M">M - Moto</option>
                <option value="C">C - Carro</option>
                <option value="K">K - Camioneta</option>
                <option value="B">B - Bus</option>
            </select>
        </div>
        <div class="mb-3 mt-3" id="campoCilindraje">
            <label for="cilindrajeId">Cilindraje:</label>
            <input type="number" class="form-control" id="cilindrajeId" placeholder="Digite el cilindraje" name="cilindraje">
        </div>
        <div class="mb-3 mt-3" id="campoNumeroPuertas" style="display:none;">
            <label for="numeroPuertasId">Numero de Puertas:</label>
            <input type="number" class="form-control" id="numeroPuertasId" placeholder="Digite el numero de puertas" name="numeroPuertas">
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <button type="button" class="btn btn-secondary" onclick="ocultarFormRegistro()">Cancelar</button>
    </form>
</div>
</section>

<div class="container mt-4">
    <h4>Total Recaudado del Dia: <span id="totalDiario">$0</span></h4>
</div>

<table class="table table-hover" id="tablaVehiculos">
    <thead>
        <tr>
            <th>No.</th>
            <th>Placa</th>
            <th>Propietario</th>
            <th>Horas</th>
            <th>Tarifa Base</th>
            <th>Tipo</th>
            <th>Cilindraje</th>
            <th>N. Puertas</th>
            <th>Tarifa Total</th>
            <th>Actualizar</th>
            <th>Eliminar</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script src="model/Vehiculo.js"></script>
<script src="model/Moto.js"></script>
<script src="model/Carro.js"></script>
<script src="controller/main.js"></script>
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
